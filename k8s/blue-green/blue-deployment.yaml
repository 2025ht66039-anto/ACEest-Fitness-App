apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      track: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: blue
    spec:
      containers:
        - name: aceest-fitness
          image: 2025ht66039/aceest-fitness-app:v1
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5